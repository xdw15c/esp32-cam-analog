; ============================================================
; ESP32-CAM AI Thinker  (OV2640, PSRAM, SD_MMC)
; ============================================================

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; --- Upload ---
upload_protocol = esptool
upload_speed    = 921600
upload_port     = COM17

; --- Serial monitor ---
monitor_speed   = 115200
monitor_port    = COM17
monitor_filters = esp32_exception_decoder, colorize

; --- Build ---
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192

; partition scheme with 3 MB app (camera needs space)
board_build.partitions = huge_app.csv

lib_deps =

